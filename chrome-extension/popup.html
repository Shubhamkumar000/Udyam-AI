<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 16px;
      margin: 0;
      background-color: #0B0F19;
      color: #F3F4F6;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #1F2937;
      padding-bottom: 12px;
      margin-bottom: 12px;
    }
    .title {
      font-size: 14px;
      font-weight: bold;
      color: #3B82F6;
      margin: 0;
    }
    .subtitle {
      font-size: 9px;
      color: #6B7280;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .profile-card {
      background-color: #111827;
      border: 1px solid #1F2937;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 14px;
    }
    .profile-title {
      font-size: 11px;
      color: #9CA3AF;
      margin-bottom: 6px;
    }
    .profile-name {
      font-size: 12px;
      font-weight: 600;
      color: #FFF;
    }
    .btn {
      background-color: #2563EB;
      color: #FFF;
      border: none;
      border-radius: 6px;
      padding: 10px;
      font-size: 12px;
      font-weight: bold;
      width: 100%;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .btn:hover {
      background-color: #1D4ED8;
    }
    .status {
      font-size: 10px;
      color: #10B981;
      text-align: center;
      margin-top: 8px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h3 class="title">Udyan Autofill</h3>
      <p class="subtitle">Compliance Copilot Active</p>
    </div>
  </div>
  
  <div class="profile-card">
    <div class="profile-title">Active Business Profile:</div>
    <div class="profile-name" id="profile-name">Loading Profile...</div>
  </div>

  <button class="btn" id="autofill-btn">Auto Fill Form</button>
  <div class="status" id="status-text">✓ Form Autofilled Successfully</div>

  <script src="popup.js"></script>
</body>
</html>
